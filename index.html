<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고 관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.25s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const CATEGORIES = ['전자제품', '의류', '식품', '가구', '스포츠', '도서', '기타'];

const INITIAL_ITEMS = [
  { id: 1, name: 'MANUKA HONEY STICK 10 MGO 100+', category: '식품', quantity: 2700, price: 0, minStock: 100, supplier: 'Bada International' },
  { id: 2, name: 'MANUKA HONEY STICK 10 MGO 300+', category: '식품', quantity: 2700, price: 0, minStock: 100, supplier: 'Bada International' },
];

function StatCard({ label, value, sub, color, icon }) {
  return (
    <div className={`bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex items-center gap-4`}>
      <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl ${color}`}>
        {icon}
      </div>
      <div>
        <p className="text-sm text-gray-500 font-medium">{label}</p>
        <p className="text-2xl font-bold text-gray-800">{value}</p>
        {sub && <p className="text-xs text-gray-400 mt-0.5">{sub}</p>}
      </div>
    </div>
  );
}

function Badge({ quantity, minStock }) {
  if (quantity === 0) return <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">품절</span>;
  if (quantity <= minStock) return <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">부족</span>;
  return <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">정상</span>;
}

function Modal({ item, onClose, onSave }) {
  const [form, setForm] = useState(item || {
    name: '', category: '전자제품', quantity: 0, price: 0, minStock: 10, supplier: ''
  });

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim()) return;
    onSave({ ...form, quantity: Number(form.quantity), price: Number(form.price), minStock: Number(form.minStock) });
  }

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-in">
        <div className="flex items-center justify-between p-6 border-b border-gray-100">
          <h2 className="text-lg font-bold text-gray-800">{item ? '상품 수정' : '신규 상품 추가'}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl font-light w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors">✕</button>
        </div>
        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">상품명 *</label>
            <input value={form.name} onChange={e => setForm({...form, name: e.target.value})}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
              placeholder="상품명을 입력하세요" required />
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">카테고리</label>
              <select value={form.category} onChange={e => setForm({...form, category: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">공급업체</label>
              <input value={form.supplier} onChange={e => setForm({...form, supplier: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="공급업체명" />
            </div>
          </div>
          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">재고 수량</label>
              <input type="number" min="0" value={form.quantity} onChange={e => setForm({...form, quantity: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">최소 재고</label>
              <input type="number" min="0" value={form.minStock} onChange={e => setForm({...form, minStock: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">단가 (원)</label>
              <input type="number" min="0" value={form.price} onChange={e => setForm({...form, price: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
          </div>
          <div className="flex gap-3 pt-2">
            <button type="button" onClick={onClose}
              className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition-colors">
              취소
            </button>
            <button type="submit"
              className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700 transition-colors">
              {item ? '수정 완료' : '추가하기'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem('stockflow-items');
      return saved ? JSON.parse(saved) : INITIAL_ITEMS;
    } catch { return INITIAL_ITEMS; }
  });
  const [search, setSearch] = useState('');
  const [filterCategory, setFilterCategory] = useState('전체');
  const [filterStatus, setFilterStatus] = useState('전체');
  const [modal, setModal] = useState(null); // null | 'add' | item object
  const [sortBy, setSortBy] = useState({ key: 'name', dir: 'asc' });
  const [selected, setSelected] = useState([]);
  const [toast, setToast] = useState(null);
  const [nextId, setNextId] = useState(() => {
    try {
      const saved = localStorage.getItem('stockflow-items');
      const parsed = saved ? JSON.parse(saved) : INITIAL_ITEMS;
      return Math.max(...parsed.map(i => i.id)) + 1;
    } catch { return 3; }
  });

  useEffect(() => {
    localStorage.setItem('stockflow-items', JSON.stringify(items));
  }, [items]);

  function showToast(msg, type = 'success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  }

  const filtered = useMemo(() => {
    return items
      .filter(item => {
        const matchSearch = item.name.toLowerCase().includes(search.toLowerCase()) ||
          item.supplier.toLowerCase().includes(search.toLowerCase());
        const matchCat = filterCategory === '전체' || item.category === filterCategory;
        const status = item.quantity === 0 ? '품절' : item.quantity <= item.minStock ? '부족' : '정상';
        const matchStatus = filterStatus === '전체' || status === filterStatus;
        return matchSearch && matchCat && matchStatus;
      })
      .sort((a, b) => {
        let va = a[sortBy.key], vb = b[sortBy.key];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortBy.dir === 'asc' ? -1 : 1;
        if (va > vb) return sortBy.dir === 'asc' ? 1 : -1;
        return 0;
      });
  }, [items, search, filterCategory, filterStatus, sortBy]);

  const stats = useMemo(() => {
    const total = items.length;
    const lowStock = items.filter(i => i.quantity > 0 && i.quantity <= i.minStock).length;
    const outOfStock = items.filter(i => i.quantity === 0).length;
    const totalValue = items.reduce((s, i) => s + i.quantity * i.price, 0);
    return { total, lowStock, outOfStock, totalValue };
  }, [items]);

  function handleSort(key) {
    setSortBy(prev => prev.key === key ? { key, dir: prev.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'asc' });
  }

  function handleSave(form) {
    if (modal === 'add') {
      setItems(prev => [...prev, { ...form, id: nextId }]);
      setNextId(n => n + 1);
      showToast('상품이 추가되었습니다!');
    } else {
      setItems(prev => prev.map(i => i.id === modal.id ? { ...form, id: i.id } : i));
      showToast('상품이 수정되었습니다!');
    }
    setModal(null);
  }

  function handleDelete(ids) {
    setItems(prev => prev.filter(i => !ids.includes(i.id)));
    setSelected([]);
    showToast(`${ids.length}개 상품이 삭제되었습니다.`, 'error');
  }

  function toggleSelect(id) {
    setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }

  function toggleAll() {
    setSelected(prev => prev.length === filtered.length ? [] : filtered.map(i => i.id));
  }

  function SortIcon({ col }) {
    if (sortBy.key !== col) return <span className="text-gray-300 ml-1">↕</span>;
    return <span className="text-indigo-500 ml-1">{sortBy.dir === 'asc' ? '↑' : '↓'}</span>;
  }

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">📦</div>
            <div>
              <h1 className="text-lg font-bold text-gray-900">StockFlow</h1>
              <p className="text-xs text-gray-400">재고 관리 시스템</p>
            </div>
          </div>
          <button onClick={() => setModal('add')}
            className="bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-sm">
            <span className="text-base">+</span> 상품 추가
          </button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">
          <StatCard label="전체 상품" value={stats.total} sub="등록된 SKU" icon="🗂️" color="bg-indigo-50 text-indigo-600" />
          <StatCard label="재고 부족" value={stats.lowStock} sub="최소 재고 미만" icon="⚠️" color="bg-amber-50 text-amber-600" />
          <StatCard label="품절 상품" value={stats.outOfStock} sub="즉시 발주 필요" icon="🚨" color="bg-red-50 text-red-600" />
          <StatCard label="총 재고 가치" value={`₩${stats.totalValue.toLocaleString()}`} sub="현재 재고 기준" icon="💰" color="bg-green-50 text-green-600" />
        </div>

        {/* Filters */}
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 fade-in">
          <div className="flex flex-col md:flex-row gap-4">
            <div className="relative flex-1">
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="상품명 또는 공급업체 검색..."
                className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
            </div>
            <div className="flex gap-3">
              <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)}
                className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="전체">전체 카테고리</option>
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
              <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
                className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="전체">전체 상태</option>
                <option>정상</option>
                <option>부족</option>
                <option>품절</option>
              </select>
            </div>
          </div>
        </div>

        {/* Bulk actions */}
        {selected.length > 0 && (
          <div className="bg-indigo-50 border border-indigo-200 rounded-2xl px-5 py-3 flex items-center justify-between fade-in">
            <span className="text-sm font-medium text-indigo-700">{selected.length}개 선택됨</span>
            <button onClick={() => handleDelete(selected)}
              className="bg-red-500 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-red-600 transition-colors">
              선택 삭제
            </button>
          </div>
        )}

        {/* Table */}
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead>
                <tr className="bg-gray-50 border-b border-gray-100">
                  <th className="w-12 px-5 py-3.5">
                    <input type="checkbox" checked={selected.length === filtered.length && filtered.length > 0}
                      onChange={toggleAll} className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                  </th>
                  {[['name','상품명'],['category','카테고리'],['supplier','공급업체'],['quantity','재고수량'],['price','단가'],['','상태'],['','관리']].map(([key, label]) => (
                    <th key={label} onClick={key ? () => handleSort(key) : undefined}
                      className={`px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide ${key ? 'cursor-pointer hover:text-gray-800 select-none' : ''}`}>
                      {label}{key && <SortIcon col={key} />}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {filtered.length === 0 ? (
                  <tr><td colSpan="8" className="text-center py-16 text-gray-400">
                    <div className="text-4xl mb-3">📭</div>
                    <p className="text-sm">검색 결과가 없습니다.</p>
                  </td></tr>
                ) : filtered.map(item => (
                  <tr key={item.id} className={`hover:bg-gray-50/50 transition-colors ${selected.includes(item.id) ? 'bg-indigo-50/50' : ''}`}>
                    <td className="px-5 py-4">
                      <input type="checkbox" checked={selected.includes(item.id)} onChange={() => toggleSelect(item.id)}
                        className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                    </td>
                    <td className="px-5 py-4">
                      <span className="text-sm font-medium text-gray-800">{item.name}</span>
                    </td>
                    <td className="px-5 py-4">
                      <span className="px-2.5 py-1 bg-gray-100 text-gray-600 rounded-lg text-xs font-medium">{item.category}</span>
                    </td>
                    <td className="px-5 py-4 text-sm text-gray-600">{item.supplier || '—'}</td>
                    <td className="px-5 py-4">
                      <div className="flex items-center gap-2">
                        <span className="text-sm font-semibold text-gray-800">{item.quantity.toLocaleString()}</span>
                        <span className="text-xs text-gray-400">/ {item.minStock}</span>
                      </div>
                      <div className="w-24 h-1.5 bg-gray-100 rounded-full mt-1.5">
                        <div className={`h-1.5 rounded-full transition-all ${
                          item.quantity === 0 ? 'bg-red-500' :
                          item.quantity <= item.minStock ? 'bg-amber-400' : 'bg-green-400'
                        }`} style={{width: `${Math.min(100, (item.quantity / (item.minStock * 3)) * 100)}%`}} />
                      </div>
                    </td>
                    <td className="px-5 py-4 text-sm text-gray-700 font-medium">₩{item.price.toLocaleString()}</td>
                    <td className="px-5 py-4"><Badge quantity={item.quantity} minStock={item.minStock} /></td>
                    <td className="px-5 py-4">
                      <div className="flex items-center gap-2">
                        <button onClick={() => setModal(item)}
                          className="text-xs text-indigo-600 hover:text-indigo-800 font-medium px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors">
                          수정
                        </button>
                        <button onClick={() => handleDelete([item.id])}
                          className="text-xs text-red-500 hover:text-red-700 font-medium px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
                          삭제
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-5 py-3.5 border-t border-gray-100 flex items-center justify-between">
            <p className="text-xs text-gray-400">{filtered.length}개 표시 / 전체 {items.length}개</p>
            <p className="text-xs text-gray-400">표시된 재고 가치: ₩{filtered.reduce((s,i)=>s+i.quantity*i.price,0).toLocaleString()}</p>
          </div>
        </div>
      </main>

      {/* Modal */}
      {modal && <Modal item={modal === 'add' ? null : modal} onClose={() => setModal(null)} onSave={handleSave} />}

      {/* Toast */}
      {toast && (
        <div className={`fixed bottom-6 right-6 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-medium text-white slide-in z-50 ${
          toast.type === 'error' ? 'bg-red-500' : 'bg-gray-800'
        }`}>
          {toast.type === 'error' ? '🗑️' : '✅'} {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
