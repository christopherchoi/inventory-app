<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.25s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const INITIAL_LOCATIONS = [
  { id: 1, name: 'Main Warehouse', type: 'warehouse' },
  { id: 2, name: 'Honey Barn North Van', type: 'store' },
];
const INITIAL_ITEMS = [
  { id: 1, name: 'MANUKA HONEY STICK 10 MGO 100+', sku: 'MGO-100', category: '식품', supplier: 'Bada International', costPrice: 0, sellPrice: 0 },
  { id: 2, name: 'MANUKA HONEY STICK 10 MGO 300+', sku: 'MGO-300', category: '식품', supplier: 'Bada International', costPrice: 0, sellPrice: 0 },
];
const INITIAL_STOCK = { 1: { 1: 2700, 2: 0 }, 2: { 1: 2700, 2: 0 } };

const MOV_TYPES = ['입고', '이동', '판매', '출고'];
const MOV_DESC  = { '입고': '외부 → 창고/스토어', '이동': '창고 ↔ 스토어 간 이동', '판매': '스토어에서 판매됨', '출고': '외부로 나감' };
const MOV_COLOR = { '입고': 'bg-green-100 text-green-700', '이동': 'bg-blue-100 text-blue-700', '판매': 'bg-purple-100 text-purple-700', '출고': 'bg-red-100 text-red-700' };
const MOV_ICON  = { '입고': '📥', '이동': '🔄', '판매': '🛒', '출고': '📤' };

const fmt  = n => `$${Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const fmtN = n => Number(n || 0).toLocaleString();

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}

/* ── Shared Modal Shell ── */
function Modal({ title, onClose, children }) {
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-in max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between p-6 border-b border-gray-100 sticky top-0 bg-white rounded-t-2xl">
          <h2 className="text-lg font-bold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100">✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── Item Modal ── */
function ItemModal({ item, onClose, onSave }) {
  const [form, setForm] = useState(item || { name: '', sku: '', supplier: '', costPrice: '', sellPrice: '' });
  const F = (k, v) => setForm(p => ({...p, [k]: v}));
  return (
    <Modal title={item ? '상품 수정' : '신규 상품 추가'} onClose={onClose}>
      <form onSubmit={e => { e.preventDefault(); if (form.name.trim()) onSave({ ...form, costPrice: Number(form.costPrice) || 0, sellPrice: Number(form.sellPrice) || 0 }); }} className="p-6 space-y-4">
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">상품명 *</label>
          <input value={form.name} onChange={e => F('name', e.target.value)}
            className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="상품명 입력" required />
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">SKU</label>
            <input value={form.sku} onChange={e => F('sku', e.target.value)}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: MGO-100" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">공급업체</label>
            <input value={form.supplier} onChange={e => F('supplier', e.target.value)}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="공급업체명" />
          </div>
        </div>
        <div className="bg-indigo-50 rounded-xl p-4 space-y-3">
          <p className="text-xs font-semibold text-indigo-700 uppercase tracking-wide">가격 설정</p>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">입고가 (원가) $</label>
              <input type="number" min="0" step="0.01" value={form.costPrice} onChange={e => F('costPrice', e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" placeholder="0.00" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">판매가 $</label>
              <input type="number" min="0" step="0.01" value={form.sellPrice} onChange={e => F('sellPrice', e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" placeholder="0.00" />
            </div>
          </div>
          {(Number(form.costPrice) > 0 && Number(form.sellPrice) > 0) && (
            <p className="text-xs text-indigo-600">
              마진: {fmt(Number(form.sellPrice) - Number(form.costPrice))} ({Math.round(((Number(form.sellPrice) - Number(form.costPrice)) / Number(form.sellPrice)) * 100)}%)
            </p>
          )}
        </div>
        <div className="flex gap-3 pt-2">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">취소</button>
          <button type="submit" className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700">{item ? '수정 완료' : '추가하기'}</button>
        </div>
      </form>
    </Modal>
  );
}

/* ── Location Modal ── */
function LocationModal({ onClose, onSave }) {
  const [form, setForm] = useState({ name: '', type: 'store' });
  return (
    <Modal title="위치 추가" onClose={onClose}>
      <form onSubmit={e => { e.preventDefault(); if (form.name.trim()) onSave(form); }} className="p-6 space-y-4">
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">위치명 *</label>
          <input value={form.name} onChange={e => setForm({...form, name: e.target.value})}
            className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: Honey Barn North Van" required />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-2">유형</label>
          <div className="flex gap-3">
            {[['warehouse','🏭 창고'],['store','🏪 스토어']].map(([val, label]) => (
              <button key={val} type="button" onClick={() => setForm({...form, type: val})}
                className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border-2 transition-colors ${form.type === val ? 'border-indigo-500 bg-indigo-50 text-indigo-600' : 'border-gray-200 text-gray-400'}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div className="flex gap-3 pt-2">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">취소</button>
          <button type="submit" className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700">추가하기</button>
        </div>
      </form>
    </Modal>
  );
}

/* ── Movement Modal ── */
function MovementModal({ items, locations, stock, defaultItemId, defaultLocId, onClose, onSubmit }) {
  const [form, setForm] = useState({ itemId: defaultItemId || items[0]?.id || '', type: '판매', fromLocationId: defaultLocId || '', toLocationId: '', quantity: '', sellPrice: '', memo: '' });
  const [error, setError] = useState('');
  const F = (k, v) => { setForm(p => ({...p, [k]: v})); setError(''); };

  const needsFrom = ['이동','판매','출고'].includes(form.type);
  const needsTo   = ['입고','이동'].includes(form.type);
  const isSale    = form.type === '판매';
  const selectedItem = items.find(i => i.id === Number(form.itemId));
  const currentStock = form.itemId && form.fromLocationId ? (stock[form.itemId]?.[form.fromLocationId] || 0) : null;

  useEffect(() => {
    if (selectedItem && isSale && !form.sellPrice) {
      setForm(p => ({...p, sellPrice: selectedItem.sellPrice || ''}));
    }
  }, [form.itemId, form.type]);

  function handleSubmit(e) {
    e.preventDefault();
    const qty = Number(form.quantity);
    if (!qty || qty <= 0) { setError('수량을 올바르게 입력하세요.'); return; }
    if (needsFrom && !form.fromLocationId) { setError('출발 위치를 선택하세요.'); return; }
    if (needsTo   && !form.toLocationId)   { setError('도착 위치를 선택하세요.'); return; }
    if (needsFrom && currentStock !== null && qty > currentStock) { setError(`재고 부족. 현재 재고: ${currentStock}개`); return; }
    onSubmit({
      ...form,
      itemId:         Number(form.itemId),
      fromLocationId: form.fromLocationId ? Number(form.fromLocationId) : null,
      toLocationId:   form.toLocationId   ? Number(form.toLocationId)   : null,
      quantity:       qty,
      sellPrice:      isSale ? (Number(form.sellPrice) || 0) : null,
      costPrice:      isSale ? (selectedItem?.costPrice || 0) : null,
    });
  }

  return (
    <Modal title="입출고 / 이동 기록" onClose={onClose}>
      <form onSubmit={handleSubmit} className="p-6 space-y-4">
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-2">유형</label>
          <div className="grid grid-cols-4 gap-2">
            {MOV_TYPES.map(t => (
              <button key={t} type="button" onClick={() => setForm(p => ({...p, type: t, fromLocationId: defaultLocId || '', toLocationId: ''}))}
                className={`py-2 rounded-xl text-xs font-semibold border-2 transition-colors ${form.type === t ? 'border-indigo-500 bg-indigo-50 text-indigo-600' : 'border-gray-200 text-gray-400 hover:border-gray-300'}`}>
                {MOV_ICON[t]} {t}
              </button>
            ))}
          </div>
          <p className="text-xs text-gray-400 mt-1.5">{MOV_DESC[form.type]}</p>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">상품 (SKU)</label>
          <select value={form.itemId} onChange={e => F('itemId', e.target.value)}
            className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            {items.map(i => <option key={i.id} value={i.id}>{i.sku ? `[${i.sku}] ` : ''}{i.name}</option>)}
          </select>
        </div>
        {needsFrom && (
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{form.type === '이동' ? '출발 위치' : '위치'}</label>
            <select value={form.fromLocationId} onChange={e => F('fromLocationId', e.target.value)}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">위치 선택</option>
              {locations.map(l => <option key={l.id} value={l.id}>{l.type === 'warehouse' ? '🏭' : '🏪'} {l.name}</option>)}
            </select>
            {currentStock !== null && <p className="text-xs text-gray-400 mt-1">현재 재고: <span className="font-semibold text-gray-600">{currentStock.toLocaleString()}개</span></p>}
          </div>
        )}
        {needsTo && (
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{form.type === '이동' ? '도착 위치' : '입고 위치'}</label>
            <select value={form.toLocationId} onChange={e => F('toLocationId', e.target.value)}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">위치 선택</option>
              {locations.filter(l => l.id !== Number(form.fromLocationId)).map(l => (
                <option key={l.id} value={l.id}>{l.type === 'warehouse' ? '🏭' : '🏪'} {l.name}</option>
              ))}
            </select>
          </div>
        )}
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">수량</label>
            <input type="number" min="1" value={form.quantity} onChange={e => F('quantity', e.target.value)}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="수량 입력" required />
          </div>
          {isSale && (
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">판매가 $ <span className="text-gray-400 font-normal">(개당)</span></label>
              <input type="number" min="0" step="0.01" value={form.sellPrice} onChange={e => F('sellPrice', e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="0.00" />
            </div>
          )}
        </div>
        {isSale && form.quantity && form.sellPrice && (
          <div className="bg-green-50 rounded-xl px-4 py-3 text-sm">
            <div className="flex justify-between text-gray-600">
              <span>매출</span>
              <span className="font-semibold">{fmt(Number(form.quantity) * Number(form.sellPrice))}</span>
            </div>
            {selectedItem?.costPrice > 0 && (
              <>
                <div className="flex justify-between text-gray-600 mt-1">
                  <span>원가</span>
                  <span className="font-semibold text-red-500">-{fmt(Number(form.quantity) * selectedItem.costPrice)}</span>
                </div>
                <div className="flex justify-between font-bold text-green-700 mt-1 pt-1 border-t border-green-200">
                  <span>순수익</span>
                  <span>{fmt(Number(form.quantity) * (Number(form.sellPrice) - selectedItem.costPrice))}</span>
                </div>
              </>
            )}
          </div>
        )}
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">메모 (선택)</label>
          <input value={form.memo} onChange={e => F('memo', e.target.value)}
            className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="추가 메모" />
        </div>
        {error && <p className="text-sm text-red-500 bg-red-50 rounded-xl px-4 py-2.5">{error}</p>}
        <div className="flex gap-3 pt-2">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">취소</button>
          <button type="submit" className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700">기록하기</button>
        </div>
      </form>
    </Modal>
  );
}

/* ── Bar Chart ── */
function MonthlyChart({ data }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current || !data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels: data.map(d => d.month),
        datasets: [
          { label: '매출', data: data.map(d => d.revenue), backgroundColor: 'rgba(99,102,241,0.8)', borderRadius: 6 },
          { label: '원가', data: data.map(d => d.cost), backgroundColor: 'rgba(239,68,68,0.6)', borderRadius: 6 },
          { label: '순수익', data: data.map(d => d.profit), backgroundColor: 'rgba(34,197,94,0.8)', borderRadius: 6 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { size: 12, family: 'Inter' }, padding: 16 } } },
        scales: {
          y: { ticks: { callback: v => `$${v.toLocaleString()}`, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } },
          x: { ticks: { font: { size: 11 } }, grid: { display: false } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);
  return <canvas ref={ref} />;
}

/* ── Main App ── */
function App() {
  const [locations, setLocations] = useState(() => load('sf-locations', INITIAL_LOCATIONS));
  const [items, setItems]         = useState(() => load('sf-items', INITIAL_ITEMS));
  const [stock, setStock]         = useState(() => load('sf-stock', INITIAL_STOCK));
  const [movements, setMovements] = useState(() => load('sf-movements', []));
  const [tab, setTab]             = useState('inventory');
  const [itemModal, setItemModal] = useState(null);
  const [locModal, setLocModal]   = useState(false);
  const [movModal, setMovModal]   = useState(null);
  const [toast, setToast]         = useState(null);
  const [movSearch, setMovSearch] = useState('');
  const [movFilter, setMovFilter] = useState('전체');
  const [locFilter, setLocFilter] = useState('전체');
  const [revenueYear, setRevenueYear] = useState(new Date().getFullYear());
  const [nextItemId, setNextItemId] = useState(() => Math.max(...load('sf-items', INITIAL_ITEMS).map(i => i.id), 0) + 1);
  const [nextLocId, setNextLocId]   = useState(() => Math.max(...load('sf-locations', INITIAL_LOCATIONS).map(l => l.id), 0) + 1);

  useEffect(() => { localStorage.setItem('sf-locations', JSON.stringify(locations)); }, [locations]);
  useEffect(() => { localStorage.setItem('sf-items',     JSON.stringify(items));     }, [items]);
  useEffect(() => { localStorage.setItem('sf-stock',     JSON.stringify(stock));     }, [stock]);
  useEffect(() => { localStorage.setItem('sf-movements', JSON.stringify(movements)); }, [movements]);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2800); }
  function getStock(itemId, locId) { return stock[itemId]?.[locId] || 0; }
  function getSold(itemId, locId) {
    return movements.filter(m => m.type === '판매' && m.itemId === itemId && m.fromLocationId === locId).reduce((s, m) => s + m.quantity, 0);
  }

  /* Revenue calculations */
  const sales = useMemo(() => movements.filter(m => m.type === '판매'), [movements]);

  const revenueStats = useMemo(() => {
    const totalRevenue = sales.reduce((s, m) => s + (m.sellPrice || 0) * m.quantity, 0);
    const totalCost    = sales.reduce((s, m) => s + (m.costPrice || 0) * m.quantity, 0);
    const totalProfit  = totalRevenue - totalCost;
    const margin       = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;
    return { totalRevenue, totalCost, totalProfit, margin };
  }, [sales]);

  const monthlyData = useMemo(() => {
    const months = Array.from({ length: 12 }, (_, i) => {
      const monthSales = sales.filter(m => {
        const d = new Date(m.date);
        return d.getFullYear() === revenueYear && d.getMonth() === i;
      });
      const revenue = monthSales.reduce((s, m) => s + (m.sellPrice || 0) * m.quantity, 0);
      const cost    = monthSales.reduce((s, m) => s + (m.costPrice || 0) * m.quantity, 0);
      return { month: `${i + 1}월`, revenue, cost, profit: revenue - cost, qty: monthSales.reduce((s, m) => s + m.quantity, 0) };
    });
    return months;
  }, [sales, revenueYear]);

  const activeMonths = useMemo(() => monthlyData.filter(m => m.revenue > 0 || m.qty > 0), [monthlyData]);

  const locationRevenue = useMemo(() => locations.map(loc => {
    const locSales = sales.filter(m => m.fromLocationId === loc.id);
    const revenue  = locSales.reduce((s, m) => s + (m.sellPrice || 0) * m.quantity, 0);
    const cost     = locSales.reduce((s, m) => s + (m.costPrice || 0) * m.quantity, 0);
    return { loc, revenue, cost, profit: revenue - cost, qty: locSales.reduce((s, m) => s + m.quantity, 0) };
  }), [sales, locations]);

  const skuRevenue = useMemo(() => items.map(item => {
    const itemSales = sales.filter(m => m.itemId === item.id);
    const revenue   = itemSales.reduce((s, m) => s + (m.sellPrice || 0) * m.quantity, 0);
    const cost      = itemSales.reduce((s, m) => s + (m.costPrice || 0) * m.quantity, 0);
    return { item, revenue, cost, profit: revenue - cost, qty: itemSales.reduce((s, m) => s + m.quantity, 0) };
  }), [sales, items]);

  /* Inventory rows */
  const rows = useMemo(() => {
    const result = [];
    items.forEach(item => {
      locations.forEach(loc => {
        if (locFilter !== '전체' && String(loc.id) !== locFilter) return;
        result.push({ item, loc, qty: getStock(item.id, loc.id), sold: getSold(item.id, loc.id) });
      });
    });
    return result;
  }, [items, locations, stock, movements, locFilter]);

  const globalStats = useMemo(() => {
    const totalQty  = items.reduce((s, i) => s + locations.reduce((a, l) => a + getStock(i.id, l.id), 0), 0);
    const totalSold = sales.reduce((s, m) => s + m.quantity, 0);
    return { totalQty, totalSold };
  }, [items, locations, stock, sales]);

  function handleSaveItem(form) {
    if (itemModal === 'add') {
      const id = nextItemId;
      setItems(prev => [...prev, { ...form, id }]);
      setStock(prev => ({ ...prev, [id]: {} }));
      setNextItemId(n => n + 1);
      showToast('상품이 추가됐습니다!');
    } else {
      setItems(prev => prev.map(i => i.id === itemModal.id ? { ...form, id: i.id } : i));
      showToast('상품이 수정됐습니다!');
    }
    setItemModal(null);
  }

  function handleSaveLocation(form) {
    const id = nextLocId;
    setLocations(prev => [...prev, { ...form, id }]);
    setNextLocId(n => n + 1);
    showToast(`${form.name} 추가됐습니다!`);
    setLocModal(false);
  }

  function handleMovement(form) {
    setMovements(prev => [{ ...form, id: Date.now(), date: new Date().toISOString() }, ...prev]);
    setStock(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[form.itemId]) next[form.itemId] = {};
      if (form.fromLocationId) next[form.itemId][form.fromLocationId] = Math.max(0, (next[form.itemId][form.fromLocationId] || 0) - form.quantity);
      if (form.toLocationId)   next[form.itemId][form.toLocationId]   = (next[form.itemId][form.toLocationId] || 0) + form.quantity;
      return next;
    });
    const item = items.find(i => i.id === form.itemId);
    showToast(`${MOV_ICON[form.type]} ${item?.name} ${form.quantity}개 ${form.type} 완료!`);
    setMovModal(null);
  }

  const filteredMovements = useMemo(() => movements.filter(m => {
    const item    = items.find(i => i.id === m.itemId);
    const fromLoc = locations.find(l => l.id === m.fromLocationId);
    const toLoc   = locations.find(l => l.id === m.toLocationId);
    const str = [item?.name, item?.sku, fromLoc?.name, toLoc?.name, m.memo].filter(Boolean).join(' ').toLowerCase();
    return str.includes(movSearch.toLowerCase()) && (movFilter === '전체' || m.type === movFilter);
  }), [movements, items, locations, movSearch, movFilter]);

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

                </div>
                <select value={movFilter} onChange={e => setMovFilter(e.target.value)}
                  className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                  <option value="전체">전체</option>
                  {MOV_TYPES.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-gray-50 border-b border-gray-100">
                      {['일시','유형','상품','SKU','수량','판매가','매출','출발','도착','메모'].map(h => (
                        <th key={h} className="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {filteredMovements.length === 0 ? (
                      <tr><td colSpan="10" className="text-center py-16 text-gray-400">
                        <div className="text-4xl mb-3">📋</div>
                        <p className="text-sm">이동 기록이 없습니다.</p>
                        <button onClick={() => setMovModal({})} className="mt-3 text-indigo-600 text-sm font-medium hover:underline">첫 기록 추가하기 →</button>
                      </td></tr>
                    ) : filteredMovements.map(m => {
                      const item    = items.find(i => i.id === m.itemId);
                      const fromLoc = locations.find(l => l.id === m.fromLocationId);
                      const toLoc   = locations.find(l => l.id === m.toLocationId);
                      const revenue = m.type === '판매' ? (m.sellPrice || 0) * m.quantity : null;
                      return (
                        <tr key={m.id} className="hover:bg-gray-50/50 transition-colors">
                          <td className="px-5 py-4 text-xs text-gray-400 whitespace-nowrap">{formatDate(m.date)}</td>
                          <td className="px-5 py-4"><span className={`px-2.5 py-1 rounded-lg text-xs font-semibold ${MOV_COLOR[m.type]}`}>{MOV_ICON[m.type]} {m.type}</span></td>
                          <td className="px-5 py-4 text-sm text-gray-800 font-medium">{item?.name || '—'}</td>
                          <td className="px-5 py-4">{item?.sku && <span className="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-xs font-mono">{item.sku}</span>}</td>
                          <td className="px-5 py-4 text-sm font-bold text-gray-700">{fmtN(m.quantity)}</td>
                          <td className="px-5 py-4 text-sm text-gray-600">{m.sellPrice != null ? fmt(m.sellPrice) : '—'}</td>
                          <td className="px-5 py-4 text-sm font-semibold text-green-600">{revenue != null ? fmt(revenue) : '—'}</td>
                          <td className="px-5 py-4 text-sm text-gray-500">{fromLoc ? `${fromLoc.type === 'warehouse' ? '🏭' : '🏪'} ${fromLoc.name}` : '—'}</td>
                          <td className="px-5 py-4 text-sm text-gray-500">{toLoc ? `${toLoc.type === 'warehouse' ? '🏭' : '🏪'} ${toLoc.name}` : '—'}</td>
                          <td className="px-5 py-4 text-sm text-gray-400">{m.memo || '—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="px-5 py-3.5 border-t border-gray-100">
                <p className="text-xs text-gray-400">총 {filteredMovements.length}건</p>
              </div>
            </div>
          </>
        )}
      </main>

      {itemModal && <ItemModal item={itemModal === 'add' ? null : itemModal} onClose={() => setItemModal(null)} onSave={handleSaveItem} />}
      {locModal  && <LocationModal onClose={() => setLocModal(false)} onSave={handleSaveLocation} />}
      {movModal  && <MovementModal items={items} locations={locations} stock={stock} defaultItemId={movModal.itemId} defaultLocId={movModal.locId} onClose={() => setMovModal(null)} onSubmit={handleMovement} />}

      {toast && (
        <div className="fixed bottom-6 right-6 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-medium text-white bg-gray-800 slide-in z-50">
          ✅ {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
