<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* ── Initial Data ── */
const INIT_LOCS = [
  { id:1, name:'Main Warehouse', type:'warehouse' },
  { id:2, name:'Honey Barn North Van', type:'store' },
];
const INIT_ITEMS = [
  { id:1, name:'MANUKA HONEY STICK 10 MGO 100+', sku:'MGO-100', supplier:'Bada International', costPrice:0, sellPrice:0, minStock:100 },
  { id:2, name:'MANUKA HONEY STICK 10 MGO 300+', sku:'MGO-300', supplier:'Bada International', costPrice:0, sellPrice:0, minStock:100 },
];
const INIT_STOCK = { 1:{1:2700,2:0}, 2:{1:2700,2:0} };

const MOV_TYPES = ['입고','이동','판매','출고'];
const MOV_DESC  = { '입고':'외부→창고/스토어', '이동':'창고↔스토어 이동', '판매':'스토어에서 판매', '출고':'외부로 나감' };
const MOV_COLOR = { '입고':'bg-green-100 text-green-700','이동':'bg-blue-100 text-blue-700','판매':'bg-purple-100 text-purple-700','출고':'bg-red-100 text-red-700','취소':'bg-gray-100 text-gray-500' };
const MOV_ICON  = { '입고':'📥','이동':'🔄','판매':'🛒','출고':'📤','취소':'↩️' };
const ORD_STATUS_COLOR = { '주문중':'bg-amber-100 text-amber-700','입고완료':'bg-green-100 text-green-700','취소':'bg-gray-100 text-gray-500' };

const fmt  = n => `$${Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtN = n => Number(n||0).toLocaleString();
const toISO = d => d ? new Date(d).toISOString() : new Date().toISOString();
const dateInput = iso => iso ? iso.slice(0,16) : new Date().toISOString().slice(0,16);

function load(key, fb) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):fb; } catch { return fb; } }

/* ── Auth helpers ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getSession() {
  try {
    const s = sessionStorage.getItem('sf-sess') || localStorage.getItem('sf-sess-rm');
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}
function setSession(userId, remember) {
  const s = JSON.stringify({ userId, ts: Date.now() });
  sessionStorage.setItem('sf-sess', s);
  if (remember) localStorage.setItem('sf-sess-rm', s);
}
function clearSession() {
  sessionStorage.removeItem('sf-sess');
  localStorage.removeItem('sf-sess-rm');
}

/* ── Setup Screen ── */
function SetupScreen({ onDone }) {
  const [form, setForm] = useState({ name:'', username:'', password:'', confirm:'' });
  const [err, setErr] = useState('');
  const F = (k,v) => setForm(p=>({...p,[k]:v}));
  async function handleSubmit(e) {
    e.preventDefault();
    if (form.password.length < 6) { setErr('비밀번호는 6자 이상이어야 합니다.'); return; }
    if (form.password !== form.confirm) { setErr('비밀번호가 일치하지 않습니다.'); return; }
    const hash = await hashPw(form.password);
    const user = { id: Date.now(), name: form.name, username: form.username.toLowerCase(), passwordHash: hash, role: 'admin', createdAt: new Date().toISOString() };
    localStorage.setItem('sf-users', JSON.stringify([user]));
    setSession(user.id, true);
    onDone(user);
  }
  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-white flex items-center justify-center p-4">
      <div className="w-full max-w-md slide-in">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg">📦</div>
          <h1 className="text-2xl font-bold text-gray-900">StockFlow 시작하기</h1>
          <p className="text-gray-500 mt-1 text-sm">관리자 계정을 만들어주세요</p>
        </div>
        <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">이름</label>
              <input value={form.name} onChange={e=>F('name',e.target.value)} required className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="홍길동" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">아이디</label>
              <input value={form.username} onChange={e=>F('username',e.target.value)} required className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="admin" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
              <input type="password" value={form.password} onChange={e=>F('password',e.target.value)} required className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="6자 이상" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
              <input type="password" value={form.confirm} onChange={e=>F('confirm',e.target.value)} required className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="비밀번호 재입력" />
            </div>
            {err && <p className="text-sm text-red-500 bg-red-50 rounded-xl px-4 py-2.5">{err}</p>}
            <button type="submit" className="w-full bg-indigo-600 text-white rounded-xl py-3 text-sm font-semibold hover:bg-indigo-700 transition-colors mt-2">관리자 계정 만들기</button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── Login Screen ── */
function LoginScreen({ onLogin }) {
  const [form, setForm] = useState({ username:'', password:'', remember:false });
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const F = (k,v) => setForm(p=>({...p,[k]:v}));
  async function handleSubmit(e) {
    e.preventDefault();
    setLoading(true); setErr('');
    const users = load('sf-users', []);
    const user = users.find(u => u.username === form.username.toLowerCase());
    if (!user) { setErr('아이디 또는 비밀번호가 올바르지 않습니다.'); setLoading(false); return; }
    const hash = await hashPw(form.password);
    if (hash !== user.passwordHash) { setErr('아이디 또는 비밀번호가 올바르지 않습니다.'); setLoading(false); return; }
    setSession(user.id, form.remember);
    onLogin(user);
  }
  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-white flex items-center justify-center p-4">
      <div className="w-full max-w-md slide-in">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg">📦</div>
          <h1 className="text-2xl font-bold text-gray-900">StockFlow</h1>
          <p className="text-gray-500 mt-1 text-sm">재고·수익·거래처 통합 관리</p>
        </div>
        <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">아이디</label>
              <input value={form.username} onChange={e=>F('username',e.target.value)} required autoFocus className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="아이디 입력" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
              <input type="password" value={form.password} onChange={e=>F('password',e.target.value)} required className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="비밀번호 입력" />
            </div>
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={form.remember} onChange={e=>F('remember',e.target.checked)} className="w-4 h-4 rounded accent-indigo-600" />
              <span className="text-sm text-gray-600">로그인 상태 유지</span>
            </label>
            {err && <p className="text-sm text-red-500 bg-red-50 rounded-xl px-4 py-2.5">{err}</p>}
            <button type="submit" disabled={loading} className="w-full bg-indigo-600 text-white rounded-xl py-3 text-sm font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-60">
              {loading ? '확인 중...' : '로그인'}
            </button>
          </form>
        </div>
        <p className="text-center text-xs text-gray-400 mt-4">문제가 있으면 관리자에게 문의하세요.</p>
      </div>
    </div>
  );
}

/* ── User Management Modal ── */
function UserModal({ editUser, onClose, onSave }) {
  const [form, setForm] = useState(editUser ? { name: editUser.name, username: editUser.username, role: editUser.role, password: '', confirm: '' } : { name:'', username:'', role:'staff', password:'', confirm:'' });
  const [err, setErr] = useState('');
  const F = (k,v) => setForm(p=>({...p,[k]:v}));
  async function handleSubmit(e) {
    e.preventDefault();
    if (!editUser && form.password.length < 6) { setErr('비밀번호는 6자 이상이어야 합니다.'); return; }
    if (!editUser && form.password !== form.confirm) { setErr('비밀번호가 일치하지 않습니다.'); return; }
    if (editUser && form.password && form.password !== form.confirm) { setErr('비밀번호가 일치하지 않습니다.'); return; }
    let passwordHash = editUser?.passwordHash;
    if (form.password) passwordHash = await hashPw(form.password);
    onSave({ ...editUser, name: form.name, username: form.username.toLowerCase(), role: form.role, passwordHash });
  }
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-in">
        <div className="flex items-center justify-between p-6 border-b border-gray-100">
          <h2 className="text-lg font-bold text-gray-800">{editUser ? '계정 수정' : '계정 추가'}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100">✕</button>
        </div>
        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">이름</label>
              <input value={form.name} onChange={e=>F('name',e.target.value)} required className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="홍길동" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">아이디</label>
              <input value={form.username} onChange={e=>F('username',e.target.value)} required disabled={!!editUser} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-gray-50" placeholder="username" />
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">역할</label>
            <div className="flex gap-3">
              {[['admin','👑 Admin','전체 접근 + 사용자 관리'],['staff','👤 Staff','재고/입출고만']].map(([val,label,desc])=>(
                <button key={val} type="button" onClick={()=>F('role',val)}
                  className={`flex-1 py-2.5 px-3 rounded-xl text-sm border-2 transition-colors text-left ${form.role===val?'border-indigo-500 bg-indigo-50':'border-gray-200 hover:border-gray-300'}`}>
                  <div className="font-semibold text-gray-800">{label}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{desc}</div>
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{editUser ? '새 비밀번호 (변경시만)' : '비밀번호 *'}</label>
            <input type="password" value={form.password} onChange={e=>F('password',e.target.value)} required={!editUser} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="6자 이상" />
          </div>
          {form.password && (
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
              <input type="password" value={form.confirm} onChange={e=>F('confirm',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="비밀번호 재입력" />
            </div>
          )}
          {err && <p className="text-sm text-red-500 bg-red-50 rounded-xl px-4 py-2.5">{err}</p>}
          <div className="flex gap-3 pt-2">
            <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">취소</button>
            <button type="submit" className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700">{editUser ? '수정 완료' : '계정 추가'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function exportCSV(filename, headers, rows) {
  const lines = [headers.join(','), ...rows.map(r => r.map(c => `"${String(c??'').replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob(['﻿'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

/* ── Modal Shell ── */
function Modal({ title, onClose, children, wide }) {
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${wide?'max-w-2xl':'max-w-md'} slide-in max-h-[90vh] overflow-y-auto`}>
        <div className="flex items-center justify-between p-6 border-b border-gray-100 sticky top-0 bg-white rounded-t-2xl z-10">
          <h2 className="text-lg font-bold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100">✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── Item Modal ── */
function ItemModal({ item, suppliers, images, onClose, onSave, onImage }) {
  const [form, setForm] = useState(item || { name:'', sku:'', supplier:'', costPrice:'', sellPrice:'', minStock:'' });
  const F = (k,v) => setForm(p=>({...p,[k]:v}));
  const imgRef = useRef();
  const img = images[item?.id];

  function handleImg(e) {
    const file = e.target.files[0]; if (!file) return;
    if (file.size > 1024*1024) { alert('이미지는 1MB 이하로 올려주세요.'); return; }
    const reader = new FileReader();
    reader.onload = ev => onImage(item?.id || '_new', ev.target.result);
    reader.readAsDataURL(file);
  }

  return (
    <Modal title={item?'상품 수정':'신규 상품 추가'} onClose={onClose}>
      <form onSubmit={e=>{e.preventDefault();if(form.name.trim())onSave({...form,costPrice:Number(form.costPrice)||0,sellPrice:Number(form.sellPrice)||0,minStock:Number(form.minStock)||0});}} className="p-6 space-y-4">
        {/* Image */}
        <div className="flex items-center gap-4">
          <div className="w-16 h-16 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center cursor-pointer overflow-hidden hover:border-indigo-400 transition-colors flex-shrink-0" onClick={()=>imgRef.current?.click()}>
            {img ? <img src={img} className="w-full h-full object-cover" /> : <span className="text-2xl">📷</span>}
          </div>
          <div>
            <p className="text-sm font-medium text-gray-700">상품 이미지</p>
            <p className="text-xs text-gray-400">클릭하여 업로드 (1MB 이하)</p>
          </div>
          <input ref={imgRef} type="file" accept="image/*" className="hidden" onChange={handleImg} />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">상품명 *</label>
          <input value={form.name} onChange={e=>F('name',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="상품명 입력" required />
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">SKU</label>
            <input value={form.sku} onChange={e=>F('sku',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: MGO-100" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">공급업체</label>
            <input value={form.supplier} onChange={e=>F('supplier',e.target.value)} list="supplier-list" className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="공급업체명" />
            <datalist id="supplier-list">{suppliers.map(s=><option key={s.id} value={s.name}/>)}</datalist>
          </div>
        </div>
        <div className="bg-indigo-50 rounded-xl p-4 space-y-3">
          <p className="text-xs font-semibold text-indigo-700 uppercase tracking-wide">가격 · 재고 설정</p>
          <div className="grid grid-cols-3 gap-3">
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">입고가 $</label>
              <input type="number" min="0" step="0.01" value={form.costPrice} onChange={e=>F('costPrice',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" placeholder="0.00" />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">판매가 $</label>
              <input type="number" min="0" step="0.01" value={form.sellPrice} onChange={e=>F('sellPrice',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" placeholder="0.00" />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">최소 재고</label>
              <input type="number" min="0" value={form.minStock} onChange={e=>F('minStock',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" placeholder="0" />
            </div>
          </div>
          {(Number(form.costPrice)>0&&Number(form.sellPrice)>0)&&(
            <p className="text-xs text-indigo-600">마진: {fmt(Number(form.sellPrice)-Number(form.costPrice))} ({Math.round(((Number(form.sellPrice)-Number(form.costPrice))/Number(form.sellPrice))*100)}%)</p>
          )}
        </div>
        <div className="flex gap-3 pt-2">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">취소</button>
          <button type="submit" className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700">{item?'수정 완료':'추가하기'}</button>
        </div>
      </form>
    </Modal>
  );
}

/* ── Location Modal ── */
function LocationModal({ onClose, onSave }) {
  const [form, setForm] = useState({ name:'', type:'store' });
  return (
    <Modal title="위치 추가" onClose={onClose}>
      <form onSubmit={e=>{e.preventDefault();if(form.name.trim())onSave(form);}} className="p-6 space-y-4">

function MovementModal({ items, locations, stock, suppliers, defaultItemId, defaultLocId, onClose, onSubmit }) {
  const [form, setForm] = useState({itemId:defaultItemId||items[0]?.id||'',type:'판매',fromLocationId:defaultLocId||'',toLocationId:'',quantity:'',sellPrice:'',memo:'',date:dateInput()});
  const [error,setError]=useState('');
  const F=(k,v)=>{setForm(p=>({...p,[k]:v}));setError('');};
  const needsFrom=['이동','판매','출고'].includes(form.type);
  const needsTo=['입고','이동'].includes(form.type);
  const isSale=form.type==='판매';
  const selItem=items.find(i=>i.id===Number(form.itemId));
  const curStock=form.itemId&&form.fromLocationId?(stock[form.itemId]?.[form.fromLocationId]||0):null;

  useEffect(()=>{ if(selItem&&isSale&&!form.sellPrice) setForm(p=>({...p,sellPrice:selItem.sellPrice||''})); },[form.itemId,form.type]);

  function handleSubmit(e) {
    e.preventDefault();
    const qty=Number(form.quantity);
    if(!qty||qty<=0){setError('수량을 올바르게 입력하세요.');return;}
    if(needsFrom&&!form.fromLocationId){setError('출발 위치를 선택하세요.');return;}
    if(needsTo&&!form.toLocationId){setError('도착 위치를 선택하세요.');return;}
    if(needsFrom&&curStock!==null&&qty>curStock){setError(`재고 부족. 현재 재고: ${curStock}개`);return;}
    onSubmit({...form,itemId:Number(form.itemId),fromLocationId:form.fromLocationId?Number(form.fromLocationId):null,toLocationId:form.toLocationId?Number(form.toLocationId):null,quantity:qty,sellPrice:isSale?(Number(form.sellPrice)||0):null,costPrice:isSale?(selItem?.costPrice||0):null,date:toISO(form.date)});
  }

  return (
    <Modal title="입출고 / 이동 기록" onClose={onClose}>
      <form onSubmit={handleSubmit} className="p-6 space-y-4">
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-2">유형</label>
          <div className="grid grid-cols-4 gap-2">
            {MOV_TYPES.map(t=>(
              <button key={t} type="button" onClick={()=>setForm(p=>({...p,type:t,fromLocationId:defaultLocId||'',toLocationId:''}))}
                className={`py-2 rounded-xl text-xs font-semibold border-2 transition-colors ${form.type===t?'border-indigo-500 bg-indigo-50 text-indigo-600':'border-gray-200 text-gray-400 hover:border-gray-300'}`}>
                {MOV_ICON[t]} {t}
              </button>
            ))}
          </div>
          <p className="text-xs text-gray-400 mt-1.5">{MOV_DESC[form.type]}</p>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">상품 (SKU)</label>
          <select value={form.itemId} onChange={e=>F('itemId',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            {items.map(i=><option key={i.id} value={i.id}>{i.sku?`[${i.sku}] `:''}{i.name}</option>)}
          </select>
        </div>
        {needsFrom&&(
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{form.type==='이동'?'출발 위치':'위치'}</label>
            <select value={form.fromLocationId} onChange={e=>F('fromLocationId',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">위치 선택</option>
              {locations.map(l=><option key={l.id} value={l.id}>{l.type==='warehouse'?'🏭':'🏪'} {l.name}</option>)}
            </select>
            {curStock!==null&&<p className="text-xs text-gray-400 mt-1">현재 재고: <span className="font-semibold text-gray-600">{curStock.toLocaleString()}개</span></p>}
          </div>
        )}
        {needsTo&&(
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{form.type==='이동'?'도착 위치':'입고 위치'}</label>
            <select value={form.toLocationId} onChange={e=>F('toLocationId',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">위치 선택</option>
              {locations.filter(l=>l.id!==Number(form.fromLocationId)).map(l=><option key={l.id} value={l.id}>{l.type==='warehouse'?'🏭':'🏪'} {l.name}</option>)}
            </select>
          </div>
        )}
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">수량</label>
            <input type="number" min="1" value={form.quantity} onChange={e=>F('quantity',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="수량" required />
          </div>
          {isSale&&(
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">판매가 $ (개당)</label>
              <input type="number" min="0" step="0.01" value={form.sellPrice} onChange={e=>F('sellPrice',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="0.00" />

            <div className="flex justify-between text-gray-600"><span>매출</span><span className="font-semibold">{fmt(Number(form.quantity)*Number(form.sellPrice))}</span></div>

            <div className="flex justify-between font-bold text-green-700 pt-1 border-t border-green-200"><span>순수익</span><span>{fmt(Number(form.quantity)*(Number(form.sellPrice)-selItem.costPrice))}</span></div></>}
          </div>
        )}

          <label className="block text-sm font-medium text-gray-700 mb-1">날짜 (과거 입력 가능)</label>

        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">메모 (선택)</label>
          <input value={form.memo} onChange={e=>F('memo',e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="추가 메모" />
        </div>
        {error&&<p className="text-sm text-red-500 bg-red-50 rounded-xl px-4 py-2.5">{error}</p>}
        <div className="flex gap-3 pt-2">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">취소</button>
          <button type="submit" className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700">기록하기</button>
        </div>
      </form>
    </Modal>
  );
}

/* ── Chart ── */
function MonthlyChart({ data }) {
  const ref=useRef(); const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.month),datasets:[
      {label:'매출',data:data.map(d=>d.revenue),backgroundColor:'rgba(99,102,241,0.8)',borderRadius:6},
      {label:'원가',data:data.map(d=>d.cost),backgroundColor:'rgba(239,68,68,0.6)',borderRadius:6},
      {label:'순수익',data:data.map(d=>d.profit),backgroundColor:'rgba(34,197,94,0.8)',borderRadius:6},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:12,family:'Inter'},padding:16}}},scales:{y:{ticks:{callback:v=>`$${v.toLocaleString()}`,font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return <canvas ref={ref}/>;
}

/* ── App ── */
function App({ currentUser, onLogout }) {
  const [locations,setLocations]=useState(()=>load('sf-locations',INIT_LOCS));
  const [items,setItems]=useState(()=>load('sf-items',INIT_ITEMS));
  const [stock,setStock]=useState(()=>load('sf-stock',INIT_STOCK));
  const [movements,setMovements]=useState(()=>load('sf-movements',[]));
  const [suppliers,setSuppliers]=useState(()=>load('sf-suppliers',[]));
  const [orders,setOrders]=useState(()=>load('sf-orders',[]));
  const [images,setImages]=useState(()=>load('sf-images',{}));
  const [tab,setTab]=useState('inventory');
  const [itemModal,setItemModal]=useState(null);
  const [locModal,setLocModal]=useState(false);
  const [movModal,setMovModal]=useState(null);
  const [supplierModal,setSupplierModal]=useState(null);
  const [orderModal,setOrderModal]=useState(null);
  const [cancelConfirm,setCancelConfirm]=useState(null);
  const [userModal,setUserModal]=useState(null);
  const [users,setUsers]=useState(()=>load('sf-users',[]));

  useEffect(()=>{localStorage.setItem('sf-users',JSON.stringify(users));},[users]);

  const isAdmin = currentUser?.role === 'admin';

  function handleSaveUser(form) {
    if (userModal==='add') {
      const id = Date.now();
      setUsers(prev=>[...prev,{...form,id,createdAt:new Date().toISOString()}]);
      showToast('계정이 추가됐습니다!');
    } else {
      setUsers(prev=>prev.map(u=>u.id===userModal.id?{...form,id:u.id,createdAt:u.createdAt}:u));
      showToast('계정이 수정됐습니다!');
    }
    setUserModal(null);
  }

  function handleDeleteUser(id) {
    if (id === currentUser.id) { showToast('자신의 계정은 삭제할 수 없어요.'); return; }
    setUsers(prev=>prev.filter(u=>u.id!==id));
    showToast('계정이 삭제됐습니다.');
  }
  const [toast,setToast]=useState(null);
  const [movSearch,setMovSearch]=useState('');
  const [movFilter,setMovFilter]=useState('전체');
  const [locFilter,setLocFilter]=useState('전체');
  const [revenueYear,setRevenueYear]=useState(new Date().getFullYear());
  const [nextItemId,setNextItemId]=useState(()=>Math.max(...load('sf-items',INIT_ITEMS).map(i=>i.id),0)+1);
  const [nextLocId,setNextLocId]=useState(()=>Math.max(...load('sf-locations',INIT_LOCS).map(l=>l.id),0)+1);
  const [nextSuppId,setNextSuppId]=useState(()=>Math.max(...load('sf-suppliers',[]).map(s=>s.id),0)+1);
  const [nextOrdId,setNextOrdId]=useState(()=>Math.max(...load('sf-orders',[]).map(o=>o.id),0)+1);
  const [pendingImg,setPendingImg]=useState(null);

  useEffect(()=>{localStorage.setItem('sf-locations',JSON.stringify(locations));},[locations]);
  useEffect(()=>{localStorage.setItem('sf-items',JSON.stringify(items));},[items]);
  useEffect(()=>{localStorage.setItem('sf-stock',JSON.stringify(stock));},[stock]);
  useEffect(()=>{localStorage.setItem('sf-movements',JSON.stringify(movements));},[movements]);
  useEffect(()=>{localStorage.setItem('sf-suppliers',JSON.stringify(suppliers));},[suppliers]);
  useEffect(()=>{localStorage.setItem('sf-orders',JSON.stringify(orders));},[orders]);
  useEffect(()=>{localStorage.setItem('sf-images',JSON.stringify(images));},[images]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),2800);}
  function getStock(itemId,locId){return stock[itemId]?.[locId]||0;}
  function getSold(itemId,locId){return movements.filter(m=>m.type==='판매'&&!m.cancelledBy&&m.itemId===itemId&&m.fromLocationId===locId).reduce((s,m)=>s+m.quantity,0);}

  const sales=useMemo(()=>movements.filter(m=>m.type==='판매'&&!m.cancelledBy),[movements]);

  /* Low stock alerts */
  const lowStockAlerts=useMemo(()=>{
    const alerts=[];
    items.forEach(item=>{
      if(!item.minStock) return;
      locations.forEach(loc=>{
        const qty=getStock(item.id,loc.id);
        if(qty<=item.minStock) alerts.push({item,loc,qty});
      });
    });
    return alerts;
  },[items,locations,stock]);

  /* Revenue stats */
  const revenueStats=useMemo(()=>{
    const totalRevenue=sales.reduce((s,m)=>s+(m.sellPrice||0)*m.quantity,0);
    const totalCost=sales.reduce((s,m)=>s+(m.costPrice||0)*m.quantity,0);
    const totalProfit=totalRevenue-totalCost;
    return{totalRevenue,totalCost,totalProfit,margin:totalRevenue>0?(totalProfit/totalRevenue)*100:0};
  },[sales]);

  const monthlyData=useMemo(()=>Array.from({length:12},(_,i)=>{
    const ms=sales.filter(m=>{const d=new Date(m.date);return d.getFullYear()===revenueYear&&d.getMonth()===i;});
    const revenue=ms.reduce((s,m)=>s+(m.sellPrice||0)*m.quantity,0);
    const cost=ms.reduce((s,m)=>s+(m.costPrice||0)*m.quantity,0);
    return{month:`${i+1}월`,revenue,cost,profit:revenue-cost,qty:ms.reduce((s,m)=>s+m.quantity,0)};
  }),[sales,revenueYear]);

  const locationRevenue=useMemo(()=>locations.map(loc=>{
    const ls=sales.filter(m=>m.fromLocationId===loc.id);
    const revenue=ls.reduce((s,m)=>s+(m.sellPrice||0)*m.quantity,0);
    const cost=ls.reduce((s,m)=>s+(m.costPrice||0)*m.quantity,0);
    return{loc,revenue,cost,profit:revenue-cost,qty:ls.reduce((s,m)=>s+m.quantity,0)};
  }),[sales,locations]);

  const skuRevenue=useMemo(()=>items.map(item=>{
    const is=sales.filter(m=>m.itemId===item.id);
    const revenue=is.reduce((s,m)=>s+(m.sellPrice||0)*m.quantity,0);
    const cost=is.reduce((s,m)=>s+(m.costPrice||0)*m.quantity,0);
    return{item,revenue,cost,profit:revenue-cost,qty:is.reduce((s,m)=>s+m.quantity,0)};
  }),[sales,items]);

  const rows=useMemo(()=>{
    const r=[];
    items.forEach(item=>locations.forEach(loc=>{
      if(locFilter!=='전체'&&String(loc.id)!==locFilter)return;
      r.push({item,loc,qty:getStock(item.id,loc.id),sold:getSold(item.id,loc.id)});
    }));
    return r;
  },[items,locations,stock,movements,locFilter]);

  const globalStats=useMemo(()=>({
    totalQty:items.reduce((s,i)=>s+locations.reduce((a,l)=>a+getStock(i.id,l.id),0),0),
    totalSold:sales.reduce((s,m)=>s+m.quantity,0),
  }),[items,locations,stock,sales]);

  /* Handlers */
  function handleSaveItem(form) {
    if(itemModal==='add'){
      const id=nextItemId;
      setItems(prev=>[...prev,{...form,id}]);
      setStock(prev=>({...prev,[id]:{}}));
      if(pendingImg) setImages(prev=>({...prev,[id]:pendingImg}));
      setNextItemId(n=>n+1);
      showToast('상품이 추가됐습니다!');
    } else {
      setItems(prev=>prev.map(i=>i.id===itemModal.id?{...form,id:i.id}:i));
      showToast('상품이 수정됐습니다!');
    }
    setPendingImg(null); setItemModal(null);
  }

  function handleImage(itemId, base64) {
    if(itemId==='_new') { setPendingImg(base64); return; }
    setImages(prev=>({...prev,[itemId]:base64}));
  }

  function handleSaveLocation(form) {
    const id=nextLocId;
    setLocations(prev=>[...prev,{...form,id}]);
    setNextLocId(n=>n+1);
    showToast(`${form.name} 추가됐습니다!`); setLocModal(false);
  }

  function handleSaveSupplier(form) {
    if(supplierModal&&supplierModal!=='add') {
      setSuppliers(prev=>prev.map(s=>s.id===supplierModal.id?{...form,id:s.id}:s));
      showToast('거래처가 수정됐습니다!');
    } else {
      const id=nextSuppId;
      setSuppliers(prev=>[...prev,{...form,id}]);
      setNextSuppId(n=>n+1);
      showToast('거래처가 추가됐습니다!');
    }
    setSupplierModal(null);
  }

  function handleSaveOrder(form) {
    if(orderModal&&orderModal!=='add') {
      setOrders(prev=>prev.map(o=>o.id===orderModal.id?{...form,id:o.id}:o));
      showToast('발주가 수정됐습니다!');
    } else {
      const id=nextOrdId;
      setOrders(prev=>[{...form,id,status:'주문중',createdAt:new Date().toISOString()},...prev]);
      setNextOrdId(n=>n+1);
      showToast('발주가 등록됐습니다!');
    }
    setOrderModal(null);
  }

  function handleReceiveOrder(order) {
    setOrders(prev=>prev.map(o=>o.id===order.id?{...o,status:'입고완료',receivedAt:new Date().toISOString()}:o));
    const mov={id:Date.now(),date:new Date().toISOString(),type:'입고',itemId:order.itemId,fromLocationId:null,toLocationId:order.toLocationId,quantity:order.quantity,sellPrice:null,costPrice:order.unitCost,memo:`[발주 입고] ${suppliers.find(s=>s.id===order.supplierId)?.name||''}`,cancelledBy:null};
    setMovements(prev=>[mov,...prev]);
    setStock(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[order.itemId])n[order.itemId]={};if(order.toLocationId)n[order.itemId][order.toLocationId]=(n[order.itemId][order.toLocationId]||0)+order.quantity;return n;});
    showToast('📥 입고 완료! 재고에 반영됐습니다.');
  }

  function handleMovement(form) {
    setMovements(prev=>[{...form,id:Date.now(),cancelledBy:null},...prev]);
    setStock(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[form.itemId])n[form.itemId]={};if(form.fromLocationId)n[form.itemId][form.fromLocationId]=Math.max(0,(n[form.itemId][form.fromLocationId]||0)-form.quantity);if(form.toLocationId)n[form.itemId][form.toLocationId]=(n[form.itemId][form.toLocationId]||0)+form.quantity;return n;});
    const item=items.find(i=>i.id===form.itemId);
    showToast(`${MOV_ICON[form.type]} ${item?.name} ${form.quantity}개 ${form.type} 완료!`);
    setMovModal(null);
  }

  function handleCancel(original) {
    const cancelId=Date.now();
    setMovements(prev=>[{id:cancelId,date:new Date().toISOString(),type:'취소',itemId:original.itemId,fromLocationId:original.toLocationId,toLocationId:original.fromLocationId,quantity:original.quantity,sellPrice:null,costPrice:null,memo:`[취소] 원본 #${original.id}`,cancelOf:original.id,cancelledBy:null},...prev.map(m=>m.id===original.id?{...m,cancelledBy:cancelId}:m)]);
    setStock(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[original.itemId])n[original.itemId]={};if(original.fromLocationId)n[original.itemId][original.fromLocationId]=(n[original.itemId][original.fromLocationId]||0)+original.quantity;if(original.toLocationId)n[original.itemId][original.toLocationId]=Math.max(0,(n[original.itemId][original.toLocationId]||0)-original.quantity);return n;});
    showToast('↩️ 취소 처리됐습니다. 재고가 원복됐어요.');
    setCancelConfirm(null);
  }

  const filteredMovements=useMemo(()=>movements.filter(m=>{
    const item=items.find(i=>i.id===m.itemId);
    const fl=locations.find(l=>l.id===m.fromLocationId);
    const tl=locations.find(l=>l.id===m.toLocationId);
    const str=[item?.name,item?.sku,fl?.name,tl?.name,m.memo].filter(Boolean).join(' ').toLowerCase();
    return str.includes(movSearch.toLowerCase())&&(movFilter==='전체'||m.type===movFilter||(movFilter==='취소됨'&&m.cancelledBy));
  }),[movements,items,locations,movSearch,movFilter]);

  function formatDate(iso){if(!iso)return'—';const d=new Date(iso);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

  function StockBadge({qty,minStock}){
    if(qty===0)return<span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700 whitespace-nowrap">품절</span>;
    if(minStock&&qty<=minStock)return<span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700 whitespace-nowrap">부족</span>;
    return<span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700 whitespace-nowrap">정상</span>;
  }

  /* CSV Exports */
  function exportInventory(){
    exportCSV('inventory.csv',['상품명','SKU','공급업체','위치','재고수량','판매수량','입고가','판매가','상태'],
      rows.map(r=>[r.item.name,r.item.sku||'',r.item.supplier||'',r.loc.name,r.qty,r.sold,r.item.costPrice||'',r.item.sellPrice||'',r.qty===0?'품절':r.item.minStock&&r.qty<=r.item.minStock?'부족':'정상']));
    showToast('📥 재고 CSV 다운로드!');
  }

  function exportMovements(){
    exportCSV('movements.csv',['일시','유형','상품명','SKU','수량','판매가','매출','출발','도착','메모'],
      filteredMovements.map(m=>{
        const item=items.find(i=>i.id===m.itemId);
        const fl=locations.find(l=>l.id===m.fromLocationId);
        const tl=locations.find(l=>l.id===m.toLocationId);
        const rev=m.type==='판매'&&!m.cancelledBy?(m.sellPrice||0)*m.quantity:0;
        return[formatDate(m.date),m.type+(m.cancelledBy?' (취소됨)':''),item?.name||'',item?.sku||'',m.quantity,m.sellPrice??'',rev||'',fl?.name||'',tl?.name||'',m.memo||''];
      }));
    showToast('📥 이동이력 CSV 다운로드!');
  }

  function exportRevenue(){
    exportCSV('revenue.csv',['월','판매수량','매출','원가','순수익','마진율'],
      monthlyData.map(m=>[m.month,m.qty,m.revenue.toFixed(2),m.cost.toFixed(2),m.profit.toFixed(2),m.revenue>0?((m.profit/m.revenue)*100).toFixed(1)+'%':'']));
    showToast('📥 수익 CSV 다운로드!');
  }

  const TABS=[['inventory','📦 재고'],['revenue','💰 수익'],['movements','📋 이동이력'],['orders','🛒 발주관리'],['suppliers','🏢 거래처'],...(isAdmin?[['settings','⚙️ 설정']]:[])];
  const allowedTabs = isAdmin ? TABS.map(t=>t[0]) : ['inventory','movements'];

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-lg">📦</div>
            <div><h1 className="text-lg font-bold text-gray-900">StockFlow</h1><p className="text-xs text-gray-400">재고·수익·거래처 통합 관리</p></div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setLocModal(true)} className="border border-gray-200 text-gray-600 px-3 py-2 rounded-xl text-sm font-medium hover:bg-gray-50">🏪 위치</button>
            <button onClick={()=>setMovModal({})} className="border border-indigo-200 text-indigo-600 px-3 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-50">🔄 입출고</button>
            <button onClick={()=>setItemModal('add')} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-700 shadow-sm">+ 상품</button>
            <div className="w-px h-6 bg-gray-200 mx-1"/>
            <div className="flex items-center gap-2 bg-gray-50 rounded-xl px-3 py-2">
              <div className="w-7 h-7 bg-indigo-100 rounded-lg flex items-center justify-center text-sm font-bold text-indigo-600">{currentUser?.name?.[0]||'?'}</div>
              <div className="hidden md:block">
                <p className="text-xs font-semibold text-gray-700 leading-tight">{currentUser?.name}</p>
                <p className="text-xs text-gray-400">{currentUser?.role==='admin'?'👑 Admin':'👤 Staff'}</p>
              </div>
            </div>
            <button onClick={onLogout} className="border border-gray-200 text-gray-500 px-3 py-2 rounded-xl text-sm hover:bg-gray-100 transition-colors">로그아웃</button>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-6 flex gap-1 overflow-x-auto">
          {TABS.map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)}
              className={`px-4 py-2.5 text-sm font-medium border-b-2 transition-colors whitespace-nowrap ${tab===key?'border-indigo-600 text-indigo-600':'border-transparent text-gray-400 hover:text-gray-600'}`}>
              {label}
              {key==='orders'&&orders.filter(o=>o.status==='주문중').length>0&&<span className="ml-1.5 bg-amber-500 text-white text-xs rounded-full px-1.5">{orders.filter(o=>o.status==='주문중').length}</span>}
            </button>
          ))}
        </div>
      </header>

      {/* Low stock alert */}
      {lowStockAlerts.length>0&&(
        <div className="max-w-7xl mx-auto px-6 pt-4">
          <div className="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-3 flex items-start gap-3">
            <span className="text-lg mt-0.5">⚠️</span>
            <div className="flex-1">
              <p className="text-sm font-semibold text-amber-800">재고 부족 알림 ({lowStockAlerts.length}건)</p>
              <div className="flex flex-wrap gap-2 mt-1.5">
                {lowStockAlerts.map((a,i)=>(
                  <span key={i} className="text-xs bg-amber-100 text-amber-700 rounded-lg px-2.5 py-1">
                    {a.item.sku||a.item.name} @ {a.loc.name} — <strong>{a.qty}</strong>개 남음
                  </span>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      <main className="max-w-7xl mx-auto px-6 py-6 space-y-6">

        {/* ══ INVENTORY ══ */}
        {tab==='inventory'&&(
          <>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">
              {[
                {label:'전체 SKU',val:items.length,sub:'등록된 상품',color:'text-gray-800'},
                {label:'전체 재고',val:fmtN(globalStats.totalQty),sub:'모든 위치 합산',color:'text-indigo-600'},
                {label:'누적 판매',val:fmtN(globalStats.totalSold),sub:'판매 수량',color:'text-purple-600'},
                {label:'누적 매출',val:fmt(revenueStats.totalRevenue),sub:`순수익 ${fmt(revenueStats.totalProfit)}`,color:'text-green-600'},
              ].map(s=>(
                <div key={s.label} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                  <p className="text-sm text-gray-500">{s.label}</p>
                  <p className={`text-2xl font-bold mt-1 ${s.color}`}>{s.val}</p>
                  <p className="text-xs text-gray-400 mt-1">{s.sub}</p>
                </div>
              ))}
            </div>
            <div className="flex flex-wrap gap-3 fade-in">
              {locations.map(loc=>{
                const qty=items.reduce((s,i)=>s+getStock(i.id,loc.id),0);
                const sold=sales.filter(m=>m.fromLocationId===loc.id).reduce((s,m)=>s+m.quantity,0);
                const rev=sales.filter(m=>m.fromLocationId===loc.id).reduce((s,m)=>s+(m.sellPrice||0)*m.quantity,0);
                return(
                  <div key={loc.id} className="bg-white rounded-xl px-4 py-3 shadow-sm border border-gray-100 flex items-center gap-3">
                    <span className="text-xl">{loc.type==='warehouse'?'🏭':'🏪'}</span>
                    <div>
                      <p className="text-sm font-semibold text-gray-800">{loc.name}</p>
                      <p className="text-xs text-gray-400">재고 <span className="font-semibold text-indigo-600">{fmtN(qty)}</span> · 판매 <span className="font-semibold text-purple-600">{fmtN(sold)}</span>{rev>0&&<> · 매출 <span className="font-semibold text-green-600">{fmt(rev)}</span></>}</p>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between gap-4">
                <h2 className="font-semibold text-gray-800">SKU × Location 재고</h2>
                <div className="flex gap-2">
                  <select value={locFilter} onChange={e=>setLocFilter(e.target.value)} className="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="전체">전체 위치</option>
                    {locations.map(l=><option key={l.id} value={l.id}>{l.type==='warehouse'?'🏭':'🏪'} {l.name}</option>)}
                  </select>
                  <button onClick={exportInventory} className="border border-gray-200 text-gray-600 px-3 py-2 rounded-xl text-sm hover:bg-gray-50">⬇️ CSV</button>
                </div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead><tr className="bg-gray-50 border-b border-gray-100">
                    {['','상품명','SKU','Location','공급업체','재고','판매','입고가','판매가','상태','관리'].map(h=>(
                      <th key={h} className={`px-4 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap ${['재고','판매','입고가','판매가'].includes(h)?'text-right':'text-left'}`}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {items.map((item,ii)=>{
                      const itemRows=rows.filter(r=>r.item.id===item.id);
                      if(!itemRows.length)return null;
                      const totalQty=itemRows.reduce((s,r)=>s+r.qty,0);
                      const totalSold=itemRows.reduce((s,r)=>s+r.sold,0);
                      return [
                        ...itemRows.map((row,ri)=>(
                          <tr key={`${item.id}-${row.loc.id}`} className={`hover:bg-gray-50/50 transition-colors border-b border-gray-50`}>
                            <td className="px-4 py-3">
                              {ri===0&&(images[item.id]
                                ?<img src={images[item.id]} className="w-9 h-9 rounded-lg object-cover"/>
                                :<div className="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center text-base">📦</div>)}
                            </td>
                            <td className="px-4 py-3">{ri===0?<span className="text-sm font-semibold text-gray-800">{item.name}</span>:<span className="text-gray-300 text-sm pl-2">↳</span>}</td>
                            <td className="px-4 py-3 whitespace-nowrap">{ri===0&&item.sku&&<span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-mono font-semibold">{item.sku}</span>}</td>
                            <td className="px-4 py-3 whitespace-nowrap"><span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap ${row.loc.type==='warehouse'?'bg-blue-50 text-blue-700':'bg-amber-50 text-amber-700'}`}>{row.loc.type==='warehouse'?'🏭':'🏪'} {row.loc.name}</span></td>
                            <td className="px-4 py-3 text-sm text-gray-500 whitespace-nowrap">{ri===0?(item.supplier||'—'):''}</td>
                            <td className="px-4 py-3 text-right whitespace-nowrap"><span className={`text-sm font-bold ${row.qty===0?'text-red-400':'text-gray-800'}`}>{fmtN(row.qty)}</span></td>
                            <td className="px-4 py-3 text-right whitespace-nowrap"><span className={`text-sm font-semibold ${row.sold>0?'text-purple-600':'text-gray-300'}`}>{fmtN(row.sold)}</span></td>
                            <td className="px-4 py-3 text-right text-sm text-gray-500 whitespace-nowrap">{ri===0&&item.costPrice>0?fmt(item.costPrice):ri===0?'—':''}</td>
                            <td className="px-4 py-3 text-right text-sm font-medium text-gray-700 whitespace-nowrap">{ri===0&&item.sellPrice>0?fmt(item.sellPrice):ri===0?'—':''}</td>
                            <td className="px-4 py-3 whitespace-nowrap"><StockBadge qty={row.qty} minStock={item.minStock}/></td>
                            <td className="px-4 py-3">
                              <div className="flex gap-1">
                                <button onClick={()=>setMovModal({itemId:item.id,locId:row.loc.id})} className="text-xs text-indigo-600 font-medium px-2.5 py-1.5 rounded-lg hover:bg-indigo-50 whitespace-nowrap">🔄 입출고</button>
                                {ri===0&&<button onClick={()=>setItemModal(item)} className="text-xs text-gray-500 font-medium px-2.5 py-1.5 rounded-lg hover:bg-gray-100">수정</button>}
                              </div>
                            </td>
                          </tr>
                        )),
                        /* SKU 합계 행 */
                        <tr key={`total-${item.id}`} className={`bg-gray-50/80 ${ii<items.length-1?'border-b-2 border-gray-200':''}`}>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5">
                            <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">전체 합계</span>
                          </td>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5 text-right whitespace-nowrap">
                            <span className="text-sm font-bold text-indigo-600">{fmtN(totalQty)}</span>
                          </td>
                          <td className="px-4 py-2.5 text-right whitespace-nowrap">
                            <span className="text-sm font-semibold text-purple-500">{fmtN(totalSold)}</span>
                          </td>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5"/>
                          <td className="px-4 py-2.5"/>
                        </tr>
                      ];
                    })}
                  </tbody>
                </table>

              <button onClick={()=>setUserModal('add')} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-700 shadow-sm">+ 계정 추가</button>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <table className="w-full">
                <thead><tr className="bg-gray-50 border-b border-gray-100">
                  {['이름','아이디','역할','생성일',''].map(h=><th key={h} className="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>)}
                </tr></thead>
                <tbody className="divide-y divide-gray-50">
                  {users.map(u=>(
                    <tr key={u.id} className={`hover:bg-gray-50/50 transition-colors ${u.id===currentUser.id?'bg-indigo-50/30':''}`}>
                      <td className="px-6 py-4">
                        <div className="flex items-center gap-3">
                          <div className="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center text-sm font-bold text-indigo-600">{u.name?.[0]||'?'}</div>
                          <span className="text-sm font-medium text-gray-800">{u.name}{u.id===currentUser.id&&<span className="ml-2 text-xs text-indigo-500">(나)</span>}</span>
                        </div>
                      </td>
                      <td className="px-6 py-4 text-sm text-gray-600 font-mono">{u.username}</td>
                      <td className="px-6 py-4">
                        <span className={`px-2.5 py-1 rounded-lg text-xs font-semibold ${u.role==='admin'?'bg-amber-100 text-amber-700':'bg-blue-100 text-blue-700'}`}>
                          {u.role==='admin'?'👑 Admin':'👤 Staff'}
                        </span>
                      </td>
                      <td className="px-6 py-4 text-sm text-gray-400">{u.createdAt?new Date(u.createdAt).toLocaleDateString('ko-KR'):'—'}</td>
                      <td className="px-6 py-4">
                        <div className="flex gap-2">
                          <button onClick={()=>setUserModal(u)} className="text-xs text-indigo-600 font-medium px-3 py-1.5 rounded-lg hover:bg-indigo-50">수정</button>
                          {u.id!==currentUser.id&&<button onClick={()=>handleDeleteUser(u.id)} className="text-xs text-red-400 font-medium px-3 py-1.5 rounded-lg hover:bg-red-50">삭제</button>}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-4">
              <p className="text-sm font-semibold text-amber-800 mb-1">⚠️ 보안 안내</p>
              <p className="text-xs text-amber-700">이 앱은 브라우저 기반 인증으로, 소규모 팀 접근 제어 용도입니다. 비밀번호는 SHA-256으로 해시되어 저장됩니다.</p>
            </div>
          </div>
        )}
      </main>

      {/* Modals */}
      {userModal&&<UserModal editUser={userModal==='add'?null:userModal} onClose={()=>setUserModal(null)} onSave={handleSaveUser}/>}
      {itemModal&&<ItemModal item={itemModal==='add'?null:itemModal} suppliers={suppliers} images={images} onClose={()=>{setItemModal(null);setPendingImg(null);}} onSave={handleSaveItem} onImage={handleImage}/>}
      {locModal&&<LocationModal onClose={()=>setLocModal(false)} onSave={handleSaveLocation}/>}
      {movModal&&<MovementModal items={items} locations={locations} stock={stock} suppliers={suppliers} defaultItemId={movModal.itemId} defaultLocId={movModal.locId} onClose={()=>setMovModal(null)} onSubmit={handleMovement}/>}
      {supplierModal&&<SupplierModal supplier={supplierModal==='add'?null:supplierModal} onClose={()=>setSupplierModal(null)} onSave={handleSaveSupplier}/>}
      {orderModal&&<OrderModal order={orderModal==='add'?null:orderModal} items={items} suppliers={suppliers} locations={locations} onClose={()=>setOrderModal(null)} onSave={handleSaveOrder}/>}

      {cancelConfirm&&(
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm slide-in p-6 space-y-4">
            <div className="flex items-center gap-3"><div className="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center text-xl">↩️</div><h2 className="text-lg font-bold text-gray-800">기록 취소</h2></div>
            <div className="bg-gray-50 rounded-xl p-4 space-y-1 text-sm">
              <p className="text-gray-500">다음 기록을 취소하시겠어요?</p>
              <p className="font-semibold text-gray-800">{items.find(i=>i.id===cancelConfirm.itemId)?.name}</p>
              <p className="text-gray-500">{MOV_ICON[cancelConfirm.type]} {cancelConfirm.type} · {fmtN(cancelConfirm.quantity)}개 · {formatDate(cancelConfirm.date)}</p>
            </div>
            <p className="text-xs text-gray-400">재고가 원복되고 원본 기록은 "취소됨"으로 표시됩니다.</p>
            <div className="flex gap-3">
              <button onClick={()=>setCancelConfirm(null)} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">아니요</button>
              <button onClick={()=>handleCancel(cancelConfirm)} className="flex-1 bg-red-500 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-red-600">네, 취소할게요</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="fixed bottom-6 right-6 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-medium text-white bg-gray-800 slide-in z-50">✅ {toast}</div>}
    </div>
  );
}

/* ── Root with Auth ── */
function Root() {
  const [authState, setAuthState] = useState('loading');
  const [currentUser, setCurrentUser] = useState(null);

  useEffect(() => {
    const users = load('sf-users', []);
    if (users.length === 0) { setAuthState('setup'); return; }
    const sess = getSession();
    if (sess) {
      const user = users.find(u => u.id === sess.userId);
      if (user) { setCurrentUser(user); setAuthState('app'); return; }
    }
    setAuthState('login');
  }, []);

  if (authState === 'loading') return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center"><div className="text-4xl mb-4">📦</div><p className="text-gray-400 text-sm">로딩 중...</p></div>
    </div>
  );
  if (authState === 'setup') return <SetupScreen onDone={u=>{ setCurrentUser(u); setAuthState('app'); }} />;
  if (authState === 'login') return <LoginScreen onLogin={u=>{ setCurrentUser(u); setAuthState('app'); }} />;
  return <App currentUser={currentUser} onLogout={()=>{ clearSession(); setCurrentUser(null); setAuthState('login'); }} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
