<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고 관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.25s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const CATEGORIES = ['전자제품', '의류', '식품', '가구', '스포츠', '도서', '기타'];

const INITIAL_ITEMS = [
  { id: 1, name: 'MANUKA HONEY STICK 10 MGO 100+', category: '식품', quantity: 2700, price: 0, minStock: 100, supplier: 'Bada International' },
  { id: 2, name: 'MANUKA HONEY STICK 10 MGO 300+', category: '식품', quantity: 2700, price: 0, minStock: 100, supplier: 'Bada International' },
];

function StatCard({ label, value, sub, color, icon }) {
  return (
    <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex items-center gap-4">
      <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl ${color}`}>{icon}</div>
      <div>
        <p className="text-sm text-gray-500 font-medium">{label}</p>
        <p className="text-2xl font-bold text-gray-800">{value}</p>
        {sub && <p className="text-xs text-gray-400 mt-0.5">{sub}</p>}
      </div>
    </div>
  );
}

function Badge({ quantity, minStock }) {
  if (quantity === 0) return <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">품절</span>;
  if (quantity <= minStock) return <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">부족</span>;
  return <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">정상</span>;
}

function ItemModal({ item, onClose, onSave }) {
  const [form, setForm] = useState(item || { name: '', category: '식품', quantity: 0, price: 0, minStock: 100, supplier: '' });

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim()) return;
    onSave({ ...form, quantity: Number(form.quantity), price: Number(form.price), minStock: Number(form.minStock) });
  }

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-in">
        <div className="flex items-center justify-between p-6 border-b border-gray-100">
          <h2 className="text-lg font-bold text-gray-800">{item ? '상품 수정' : '신규 상품 추가'}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors">✕</button>
        </div>
        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">상품명 *</label>
            <input value={form.name} onChange={e => setForm({...form, name: e.target.value})}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="상품명을 입력하세요" required />
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">카테고리</label>
              <select value={form.category} onChange={e => setForm({...form, category: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                {CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">공급업체</label>
              <input value={form.supplier} onChange={e => setForm({...form, supplier: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="공급업체명" />
            </div>
          </div>
          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">재고 수량</label>
              <input type="number" min="0" value={form.quantity} onChange={e => setForm({...form, quantity: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">최소 재고</label>
              <input type="number" min="0" value={form.minStock} onChange={e => setForm({...form, minStock: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">단가 (원)</label>
              <input type="number" min="0" value={form.price} onChange={e => setForm({...form, price: e.target.value})}
                className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
          </div>
          <div className="flex gap-3 pt-2">
            <button type="button" onClick={onClose}
              className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition-colors">취소</button>
            <button type="submit"
              className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-indigo-700 transition-colors">
              {item ? '수정 완료' : '추가하기'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function MovementModal({ items, onClose, onSubmit }) {
  const [form, setForm] = useState({ itemId: items[0]?.id || '', type: '출고', quantity: '', destination: '', memo: '' });
  const [error, setError] = useState('');

  const selectedItem = items.find(i => i.id === Number(form.itemId));

  function handleSubmit(e) {
    e.preventDefault();
    const qty = Number(form.quantity);
    if (!qty || qty <= 0) { setError('수량을 올바르게 입력해주세요.'); return; }
    if (form.type === '출고' && selectedItem && qty > selectedItem.quantity) {
      setError(`재고가 부족합니다. 현재 재고: ${selectedItem.quantity}개`); return;
    }
    onSubmit({ ...form, itemId: Number(form.itemId), quantity: qty });
  }

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-in">
        <div className="flex items-center justify-between p-6 border-b border-gray-100">
          <h2 className="text-lg font-bold text-gray-800">입출고 기록</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors">✕</button>
        </div>
        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">상품 (SKU)</label>
            <select value={form.itemId} onChange={e => { setForm({...form, itemId: e.target.value}); setError(''); }}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              {items.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
            </select>
            {selectedItem && (
              <p className="text-xs text-gray-400 mt-1.5">현재 재고: <span className="font-semibold text-gray-600">{selectedItem.quantity.toLocaleString()}개</span></p>
            )}
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">유형</label>
            <div className="flex gap-3">
              {['출고', '입고'].map(t => (
                <button key={t} type="button" onClick={() => { setForm({...form, type: t}); setError(''); }}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border-2 transition-colors ${
                    form.type === t
                      ? t === '출고' ? 'border-red-500 bg-red-50 text-red-600' : 'border-green-500 bg-green-50 text-green-600'
                      : 'border-gray-200 text-gray-400 hover:border-gray-300'
                  }`}>
                  {t === '출고' ? '📤 출고' : '📥 입고'}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">수량</label>
            <input type="number" min="1" value={form.quantity} onChange={e => { setForm({...form, quantity: e.target.value}); setError(''); }}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="수량 입력" required />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">
              {form.type === '출고' ? '보낸 곳' : '받은 곳'}
            </label>
            <input value={form.destination} onChange={e => setForm({...form, destination: e.target.value})}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder={form.type === '출고' ? '예: 쿠팡, 네이버 스토어, 홍길동' : '예: Bada International, 공장'} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">메모 (선택)</label>
            <input value={form.memo} onChange={e => setForm({...form, memo: e.target.value})}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="추가 메모" />
          </div>
          {error && <p className="text-sm text-red-500 bg-red-50 rounded-xl px-4 py-2.5">{error}</p>}
          <div className="flex gap-3 pt-2">
            <button type="button" onClick={onClose}
              className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition-colors">취소</button>
            <button type="submit"
              className={`flex-1 text-white rounded-xl py-2.5 text-sm font-medium transition-colors ${
                form.type === '출고' ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'
              }`}>
              {form.type === '출고' ? '출고 처리' : '입고 처리'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('inventory');
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem('stockflow-items');
      return saved ? JSON.parse(saved) : INITIAL_ITEMS;
    } catch { return INITIAL_ITEMS; }
  });
  const [movements, setMovements] = useState(() => {
    try {
      const saved = localStorage.getItem('stockflow-movements');
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });
  const [search, setSearch] = useState('');
  const [filterCategory, setFilterCategory] = useState('전체');
  const [filterStatus, setFilterStatus] = useState('전체');
  const [itemModal, setItemModal] = useState(null);
  const [movementModal, setMovementModal] = useState(false);
  const [sortBy, setSortBy] = useState({ key: 'name', dir: 'asc' });
  const [selected, setSelected] = useState([]);
  const [toast, setToast] = useState(null);
  const [movSearch, setMovSearch] = useState('');
  const [movFilter, setMovFilter] = useState('전체');
  const [nextId, setNextId] = useState(() => {
    try {
      const saved = localStorage.getItem('stockflow-items');
      const parsed = saved ? JSON.parse(saved) : INITIAL_ITEMS;
      return Math.max(...parsed.map(i => i.id)) + 1;
    } catch { return 3; }
  });

  useEffect(() => { localStorage.setItem('stockflow-items', JSON.stringify(items)); }, [items]);
  useEffect(() => { localStorage.setItem('stockflow-movements', JSON.stringify(movements)); }, [movements]);

  function showToast(msg, type = 'success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  }

  const filtered = useMemo(() => {
    return items
      .filter(item => {
        const matchSearch = item.name.toLowerCase().includes(search.toLowerCase()) ||
          item.supplier.toLowerCase().includes(search.toLowerCase());
        const matchCat = filterCategory === '전체' || item.category === filterCategory;
        const status = item.quantity === 0 ? '품절' : item.quantity <= item.minStock ? '부족' : '정상';
        const matchStatus = filterStatus === '전체' || status === filterStatus;
        return matchSearch && matchCat && matchStatus;
      })
      .sort((a, b) => {
        let va = a[sortBy.key], vb = b[sortBy.key];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortBy.dir === 'asc' ? -1 : 1;
        if (va > vb) return sortBy.dir === 'asc' ? 1 : -1;
        return 0;
      });
  }, [items, search, filterCategory, filterStatus, sortBy]);

  const filteredMovements = useMemo(() => {
    return movements
      .filter(m => {
        const item = items.find(i => i.id === m.itemId);
        const name = item ? item.name.toLowerCase() : '';
        const matchSearch = name.includes(movSearch.toLowerCase()) ||
          (m.destination || '').toLowerCase().includes(movSearch.toLowerCase()) ||
          (m.memo || '').toLowerCase().includes(movSearch.toLowerCase());
        const matchType = movFilter === '전체' || m.type === movFilter;
        return matchSearch && matchType;
      })
      .sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [movements, items, movSearch, movFilter]);

  const stats = useMemo(() => {
    const total = items.length;
    const lowStock = items.filter(i => i.quantity > 0 && i.quantity <= i.minStock).length;
    const outOfStock = items.filter(i => i.quantity === 0).length;
    const totalQty = items.reduce((s, i) => s + i.quantity, 0);
    return { total, lowStock, outOfStock, totalQty };
  }, [items]);

  function handleSort(key) {
    setSortBy(prev => prev.key === key ? { key, dir: prev.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'asc' });
  }

  function handleSaveItem(form) {
    if (itemModal === 'add') {
      setItems(prev => [...prev, { ...form, id: nextId }]);
      setNextId(n => n + 1);
      showToast('상품이 추가되었습니다!');
    } else {
      setItems(prev => prev.map(i => i.id === itemModal.id ? { ...form, id: i.id } : i));
      showToast('상품이 수정되었습니다!');
    }
    setItemModal(null);
  }

  function handleDelete(ids) {
    setItems(prev => prev.filter(i => !ids.includes(i.id)));
    setSelected([]);
    showToast(`${ids.length}개 상품이 삭제되었습니다.`, 'error');
  }

  function handleMovement(form) {
    const now = new Date().toISOString();
    const newMovement = { ...form, id: Date.now(), date: now };
    setMovements(prev => [newMovement, ...prev]);
    setItems(prev => prev.map(item => {
      if (item.id !== form.itemId) return item;
      const delta = form.type === '입고' ? form.quantity : -form.quantity;
      return { ...item, quantity: Math.max(0, item.quantity + delta) };
    }));
    const item = items.find(i => i.id === form.itemId);
    showToast(`${item?.name} ${form.quantity}개 ${form.type} 완료!`, form.type === '출고' ? 'error' : 'success');
    setMovementModal(false);
  }

  function toggleSelect(id) {
    setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }

  function toggleAll() {
    setSelected(prev => prev.length === filtered.length ? [] : filtered.map(i => i.id));
  }

  function SortIcon({ col }) {
    if (sortBy.key !== col) return <span className="text-gray-300 ml-1">↕</span>;
    return <span className="text-indigo-500 ml-1">{sortBy.dir === 'asc' ? '↑' : '↓'}</span>;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">📦</div>
            <div>
              <h1 className="text-lg font-bold text-gray-900">StockFlow</h1>
              <p className="text-xs text-gray-400">재고 관리 시스템</p>
            </div>
          </div>
          <div className="flex gap-3">
            <button onClick={() => setMovementModal(true)}
              className="border border-indigo-200 text-indigo-600 px-5 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-50 transition-colors flex items-center gap-2">
              📤 입출고 기록
            </button>
            <button onClick={() => setItemModal('add')}
              className="bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-sm">
              + 상품 추가
            </button>
          </div>
        </div>
        {/* Tabs */}
        <div className="max-w-7xl mx-auto px-6 flex gap-1">
          {[['inventory','📦 재고 현황'],['movements','📋 입출고 이력']].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)}
              className={`px-5 py-2.5 text-sm font-medium border-b-2 transition-colors ${
                tab === key ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-400 hover:text-gray-600'
              }`}>
              {label}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">
          <StatCard label="전체 상품" value={stats.total} sub="등록된 SKU" icon="🗂️" color="bg-indigo-50 text-indigo-600" />
          <StatCard label="재고 부족" value={stats.lowStock} sub="최소 재고 미만" icon="⚠️" color="bg-amber-50 text-amber-600" />
          <StatCard label="품절 상품" value={stats.outOfStock} sub="즉시 발주 필요" icon="🚨" color="bg-red-50 text-red-600" />
          <StatCard label="총 재고 수량" value={stats.totalQty.toLocaleString()} sub="전체 합산" icon="📊" color="bg-green-50 text-green-600" />
        </div>

        {tab === 'inventory' && (
          <>
            {/* Filters */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 fade-in">
              <div className="flex flex-col md:flex-row gap-4">
                <div className="relative flex-1">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                  <input value={search} onChange={e => setSearch(e.target.value)}
                    placeholder="상품명 또는 공급업체 검색..."
                    className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <div className="flex gap-3">
                  <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)}
                    className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="전체">전체 카테고리</option>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                  <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
                    className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="전체">전체 상태</option>
                    <option>정상</option><option>부족</option><option>품절</option>
                  </select>
                </div>
              </div>
            </div>

            {selected.length > 0 && (
              <div className="bg-indigo-50 border border-indigo-200 rounded-2xl px-5 py-3 flex items-center justify-between fade-in">
                <span className="text-sm font-medium text-indigo-700">{selected.length}개 선택됨</span>
                <button onClick={() => handleDelete(selected)}
                  className="bg-red-500 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-red-600 transition-colors">선택 삭제</button>
              </div>
            )}

            {/* Inventory Table */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-gray-50 border-b border-gray-100">
                      <th className="w-12 px-5 py-3.5">
                        <input type="checkbox" checked={selected.length === filtered.length && filtered.length > 0}
                          onChange={toggleAll} className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                      </th>
                      {[['name','상품명'],['category','카테고리'],['supplier','공급업체'],['quantity','재고수량'],['','상태'],['','관리']].map(([key, label]) => (
                        <th key={label} onClick={key ? () => handleSort(key) : undefined}
                          className={`px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide ${key ? 'cursor-pointer hover:text-gray-800 select-none' : ''}`}>
                          {label}{key && <SortIcon col={key} />}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {filtered.length === 0 ? (
                      <tr><td colSpan="7" className="text-center py-16 text-gray-400">
                        <div className="text-4xl mb-3">📭</div>
                        <p className="text-sm">검색 결과가 없습니다.</p>
                      </td></tr>
                    ) : filtered.map(item => (
                      <tr key={item.id} className={`hover:bg-gray-50/50 transition-colors ${selected.includes(item.id) ? 'bg-indigo-50/50' : ''}`}>
                        <td className="px-5 py-4">
                          <input type="checkbox" checked={selected.includes(item.id)} onChange={() => toggleSelect(item.id)}
                            className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                        </td>
                        <td className="px-5 py-4"><span className="text-sm font-medium text-gray-800">{item.name}</span></td>
                        <td className="px-5 py-4"><span className="px-2.5 py-1 bg-gray-100 text-gray-600 rounded-lg text-xs font-medium">{item.category}</span></td>
                        <td className="px-5 py-4 text-sm text-gray-600">{item.supplier || '—'}</td>
                        <td className="px-5 py-4">
                          <div className="flex items-center gap-2">
                            <span className="text-sm font-semibold text-gray-800">{item.quantity.toLocaleString()}</span>
                            <span className="text-xs text-gray-400">/ {item.minStock}</span>
                          </div>
                          <div className="w-24 h-1.5 bg-gray-100 rounded-full mt-1.5">
                            <div className={`h-1.5 rounded-full transition-all ${
                              item.quantity === 0 ? 'bg-red-500' : item.quantity <= item.minStock ? 'bg-amber-400' : 'bg-green-400'
                            }`} style={{width: `${Math.min(100, (item.quantity / (item.minStock * 3)) * 100)}%`}} />
                          </div>
                        </td>
                        <td className="px-5 py-4"><Badge quantity={item.quantity} minStock={item.minStock} /></td>
                        <td className="px-5 py-4">
                          <div className="flex items-center gap-2">
                            <button onClick={() => setItemModal(item)}
                              className="text-xs text-indigo-600 hover:text-indigo-800 font-medium px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors">수정</button>
                            <button onClick={() => handleDelete([item.id])}
                              className="text-xs text-red-500 hover:text-red-700 font-medium px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">삭제</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="px-5 py-3.5 border-t border-gray-100 flex items-center justify-between">
                <p className="text-xs text-gray-400">{filtered.length}개 표시 / 전체 {items.length}개</p>
                <p className="text-xs text-gray-400">총 재고: {filtered.reduce((s,i)=>s+i.quantity,0).toLocaleString()}개</p>
              </div>
            </div>
          </>
        )}

        {tab === 'movements' && (
          <>
            {/* Movement Filters */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 fade-in">
              <div className="flex flex-col md:flex-row gap-4">
                <div className="relative flex-1">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                  <input value={movSearch} onChange={e => setMovSearch(e.target.value)}
                    placeholder="상품명, 거래처, 메모 검색..."
                    className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <select value={movFilter} onChange={e => setMovFilter(e.target.value)}
                  className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                  <option value="전체">전체</option>
                  <option>입고</option>
                  <option>출고</option>
                </select>
              </div>
            </div>

            {/* Movements Table */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-gray-50 border-b border-gray-100">
                      {['일시','유형','상품명','수량','거래처','메모'].map(label => (
                        <th key={label} className="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {filteredMovements.length === 0 ? (
                      <tr><td colSpan="6" className="text-center py-16 text-gray-400">
                        <div className="text-4xl mb-3">📋</div>
                        <p className="text-sm">입출고 기록이 없습니다.</p>
                        <button onClick={() => setMovementModal(true)}
                          className="mt-3 text-indigo-600 text-sm font-medium hover:underline">첫 기록 추가하기 →</button>
                      </td></tr>
                    ) : filteredMovements.map(m => {
                      const item = items.find(i => i.id === m.itemId);
                      return (
                        <tr key={m.id} className="hover:bg-gray-50/50 transition-colors">
                          <td className="px-5 py-4 text-sm text-gray-500 whitespace-nowrap">{formatDate(m.date)}</td>
                          <td className="px-5 py-4">
                            <span className={`px-2.5 py-1 rounded-lg text-xs font-semibold ${
                              m.type === '입고' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                            }`}>
                              {m.type === '입고' ? '📥 입고' : '📤 출고'}
                            </span>
                          </td>
                          <td className="px-5 py-4 text-sm font-medium text-gray-800">{item?.name || '—'}</td>
                          <td className="px-5 py-4">
                            <span className={`text-sm font-bold ${m.type === '입고' ? 'text-green-600' : 'text-red-600'}`}>
                              {m.type === '입고' ? '+' : '-'}{m.quantity.toLocaleString()}
                            </span>
                          </td>
                          <td className="px-5 py-4 text-sm text-gray-600">{m.destination || '—'}</td>
                          <td className="px-5 py-4 text-sm text-gray-400">{m.memo || '—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="px-5 py-3.5 border-t border-gray-100">
                <p className="text-xs text-gray-400">총 {filteredMovements.length}건의 기록</p>
              </div>
            </div>
          </>
        )}
      </main>

      {itemModal && <ItemModal item={itemModal === 'add' ? null : itemModal} onClose={() => setItemModal(null)} onSave={handleSaveItem} />}
      {movementModal && <MovementModal items={items} onClose={() => setMovementModal(false)} onSubmit={handleMovement} />}

      {toast && (
        <div className={`fixed bottom-6 right-6 px-5 py-3.5 rounded-2xl shadow-xl text-sm font-medium text-white slide-in z-50 ${
          toast.type === 'error' ? 'bg-red-500' : 'bg-gray-800'
        }`}>
          {toast.type === 'error' ? '📤' : '✅'} {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
